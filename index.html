<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Particle Emitter with Trails</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif; cursor: crosshair; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        #video { display: none; } 
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 16px; letter-spacing: 2px; pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="loading">카메라 로딩 중... (먼저 마우스로 화면을 그어보세요)</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aLife; 
        attribute vec3 aColor;
        varying vec3 vColor;
        varying float vLife;

        void main() {
            vColor = aColor;
            vLife = aLife;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 입자 크기 1/3로 축소
            gl_PointSize = (aLife > 0.0) ? (7.0 * aLife * (800.0 / -mvPosition.z)) : 0.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vLife;

        void main() {
            if (vLife <= 0.0) discard;

            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            float dist = length(uv);
            if (dist > 0.5) discard;
            
            float glow = pow(1.0 - (dist * 2.0), 1.5);
            gl_FragColor = vec4(vColor, glow * vLife);
        }
    </script>

    <script>
        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        let raycaster = new THREE.Raycaster();
        
        // 트레일(잔상) 처리를 위한 추가 씬과 카메라
        let fadeScene, orthoCamera;

        const MAX_PARTICLES = 100000; 
        let currentParticleIndex = 0;
        let positions, velocities, lifes, colors;

        let isMouseDown = false;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 800;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: false, preserveDrawingBuffer: true });
            renderer.setPixelRatio(1.0);
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 핵심: 매 프레임마다 화면을 지우지 않음
            renderer.autoClearColor = false; 

            // --- 잔상(Trail) 렌더링 세팅 ---
            fadeScene = new THREE.Scene();
            orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const fadeMaterial = new THREE.MeshBasicMaterial({
                color: 0x000000,
                transparent: true,
                opacity: 0.15, // ★ 이 값을 조절해서 꼬리의 길이를 바꿀 수 있습니다. (작을수록 긺, 0.05~0.2 추천)
                depthWrite: false
            });
            const fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fadeMaterial);
            fadeScene.add(fadePlane);
            // -----------------------------

            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_PARTICLES * 3);
            velocities = new Float32Array(MAX_PARTICLES * 3);
            lifes = new Float32Array(MAX_PARTICLES);
            colors = new Float32Array(MAX_PARTICLES * 3);

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aLife', new THREE.BufferAttribute(lifes, 1));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            window.addEventListener('resize', onResize);
            document.addEventListener('mousedown', (e) => { isMouseDown = true; emitFromScreen(e.clientX, e.clientY); });
            document.addEventListener('mousemove', (e) => { if(isMouseDown) emitFromScreen(e.clientX, e.clientY); });
            document.addEventListener('mouseup', () => { isMouseDown = false; });
        }

        function emitFromScreen(pixelX, pixelY) {
            let ndcX = (pixelX / window.innerWidth) * 2 - 1;
            let ndcY = -(pixelY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
            let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            let intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersectPoint);
            
            if (intersectPoint) {
                emitParticles(intersectPoint);
            }
        }

        function emitParticles(point) {
            // 개수 2배 증가
            const emitCount = 120; 
            const colorPalette = [
                new THREE.Color(0x00e5ff), 
                new THREE.Color(0x2244ff), 
                new THREE.Color(0xff00aa), 
                new THREE.Color(0xffffff)  
            ];

            for (let i = 0; i < emitCount; i++) {
                let idx = currentParticleIndex;
                currentParticleIndex = (currentParticleIndex + 1) % MAX_PARTICLES;

                positions[idx * 3] = point.x + (Math.random() - 0.5) * 10;
                positions[idx * 3 + 1] = point.y + (Math.random() - 0.5) * 10;
                positions[idx * 3 + 2] = point.z;

                // 속도 40%로 감소
                velocities[idx * 3] = (Math.random() - 0.5) * 6.0;
                velocities[idx * 3 + 1] = (Math.random() - 0.5) * 6.0;
                velocities[idx * 3 + 2] = (Math.random() - 0.5) * 6.0;

                lifes[idx] = 1.0; 

                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[idx * 3] = c.r; colors[idx * 3 + 1] = c.g; colors[idx * 3 + 2] = c.b;
            }
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('video');
            const loading = document.getElementById('loading');

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({
                maxNumHands: 1, 
                modelComplexity: 0, 
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (loading.style.opacity !== '0') loading.style.opacity = '0';

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const indexFinger = results.multiHandLandmarks[0][8]; 
                    
                    let pixelX = (1.0 - indexFinger.x) * window.innerWidth;
                    let pixelY = indexFinger.y * window.innerHeight;
                    
                    emitFromScreen(pixelX, pixelY);
                }
            });

            const cameraApp = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraApp.start();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            let posUpdated = false;

            for (let i = 0; i < MAX_PARTICLES; i++) {
                if (lifes[i] > 0.0) {
                    // 수명 3배 이상 길게
                    lifes[i] -= 0.006; 
                    if (lifes[i] <= 0.0) { lifes[i] = 0.0; continue; }

                    positions[i * 3] += velocities[i * 3];
                    positions[i * 3 + 1] += velocities[i * 3 + 1];
                    positions[i * 3 + 2] += velocities[i * 3 + 2];

                    velocities[i * 3] *= 0.95;
                    velocities[i * 3 + 1] *= 0.95;
                    velocities[i * 3 + 2] *= 0.95;

                    posUpdated = true;
                }
            }

            if (posUpdated) {
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.geometry.attributes.aLife.needsUpdate = true;
                particleSystem.geometry.attributes.aColor.needsUpdate = true;
            }

            // 1. 이전 프레임 위에 반투명 검은색 덧씌우기 (꼬리 효과 생성)
            renderer.render(fadeScene, orthoCamera);
            // 2. 그 위에 새로운 파티클 그리기
            renderer.render(scene, camera);
        }

        initThree();
        initMediaPipe();
        animate();
    </script>
</body>
</html>
