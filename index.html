<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Luminous Trails (teamLab Vibe)</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #020204; /* 심연의 어둠 */
            touch-action: none; font-family: 'Helvetica Neue', Arial, sans-serif; cursor: crosshair; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #video { display: none; } /* 웹캠 영상 숨김 */
        
        #hint {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 14px; letter-spacing: 8px; font-weight: bold;
            z-index: 10; pointer-events: none; transition: opacity 0.5s; mix-blend-mode: screen;
        }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 16px; letter-spacing: 2px;
            z-index: 10; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="loading">카메라 AI 로딩 중... (마우스로 먼저 그려보세요!)</div>
    <div id="hint">TOUCH OR MOVE HAND TO CREATE LIGHT</div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aLife; 
        attribute float aSize;
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vLife;

        void main() {
            vColor = aColor;
            vLife = aLife;

            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 수명이 남아있는 파티클만 크기 부여
            gl_PointSize = (aLife > 0.0) ? (aSize * aLife * (1000.0 / -mvPosition.z)) : 0.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vLife;

        void main() {
            if (vLife <= 0.0) discard;

            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            float dist = length(uv);
            if (dist > 0.5) discard;
            
            float glow = pow(1.0 - (dist * 2.0), 1.8);
            
            // Additive blending과 찰떡인 부드러운 입자
            gl_FragColor = vec4(vColor, glow * vLife);
        }
    </script>

    <script>
        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        let raycaster = new THREE.Raycaster();
        
        let isDrawing = false;
        let mouseX = 0, mouseY = 0;
        let lastMouseX = 0, lastMouseY = 0;
        
        // --- 입자 풀(Pool) 시스템 ---
        const MAX_PARTICLES = 80000; // 최적화된 개수
        let currentParticleIndex = 0;
        
        let positions, velocities, lifes, sizes, colors;

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 800;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x020204, 1.0); 

            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_PARTICLES * 3);
            velocities = new Float32Array(MAX_PARTICLES * 3);
            lifes = new Float32Array(MAX_PARTICLES);
            sizes = new Float32Array(MAX_PARTICLES);
            colors = new Float32Array(MAX_PARTICLES * 3);

            for (let i = 0; i < MAX_PARTICLES; i++) {
                lifes[i] = 0.0; // 안 보이게 숨김
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aLife', new THREE.BufferAttribute(lifes, 1));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            // [추가됨!] 마우스/터치 이벤트 (웹캠 전에도, 후에도 무조건 작동함)
            window.addEventListener('resize', onWindowResize);
            
            document.addEventListener('mousedown', (e) => { isDrawing = true; emitFromScreen(e.clientX, e.clientY); });
            document.addEventListener('mousemove', (e) => { if(isDrawing) emitFromScreen(e.clientX, e.clientY); });
            document.addEventListener('mouseup', () => { isDrawing = false; });
            
            document.addEventListener('touchstart', (e) => { isDrawing = true; emitFromScreen(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            document.addEventListener('touchmove', (e) => { if(isDrawing) emitFromScreen(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            document.addEventListener('touchend', () => { isDrawing = false; });
        }

        // 2D 스크린 좌표를 3D 공간으로 변환하여 파티클 뿜어내기
        function emitFromScreen(clientX, clientY) {
            let nX = (clientX / window.innerWidth) * 2 - 1;
            let nY = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera({ x: nX, y: nY }, camera);
            let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            let intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersectPoint);
            
            if (intersectPoint) {
                emitParticles(intersectPoint);
            }
        }

        // --- 핵심: 지정된 3D 위치에서 파티클 발산 ---
        function emitParticles(point) {
            const emitCount = 100; // 한 번에 터지는 입자 수
            const colorPalette = [
                new THREE.Color(0x00e5ff), // 시안
                new THREE.Color(0x2244ff), // 딥 블루
                new THREE.Color(0xff00aa), // 핫핑크
                new THREE.Color(0xffffff)  // 라이트
            ];

            for (let i = 0; i < emitCount; i++) {
                let idx = currentParticleIndex;
                currentParticleIndex = (currentParticleIndex + 1) % MAX_PARTICLES;

                // 위치 (손끝에서 살짝 퍼져서 시작)
                positions[idx * 3] = point.x + (Math.random() - 0.5) * 15;
                positions[idx * 3 + 1] = point.y + (Math.random() - 0.5) * 15;
                positions[idx * 3 + 2] = point.z + (Math.random() - 0.5) * 20;

                // 사방으로 퍼지는 폭발적인 속도
                velocities[idx * 3] = (Math.random() - 0.5) * 12.0;
                velocities[idx * 3 + 1] = (Math.random() - 0.5) * 12.0;
                velocities[idx * 3 + 2] = (Math.random() - 0.5) * 8.0;

                lifes[idx] = 1.0; // 수명 100%
                sizes[idx] = 10.0 + Math.random() * 25.0; // 입자 크기

                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[idx * 3] = c.r; colors[idx * 3 + 1] = c.g; colors[idx * 3 + 2] = c.b;
            }
        }

        // --- MediaPipe 웹캠 손가락 추적 ---
        function initMediaPipe() {
            const videoElement = document.getElementById('video');
            const loading = document.getElementById('loading');

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({
                maxNumHands: 1, 
                modelComplexity: 0, // 가벼운 모델
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (loading.style.opacity !== '0') {
                    loading.style.opacity = '0'; // 로딩 글씨 없애기
                    document.getElementById('hint').style.opacity = '0';
                }

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const indexFinger = results.multiHandLandmarks[0][8]; // 검지 끝
                    
                    // 화면 좌표로 변환하여 발산 (좌우 반전 처리)
                    let screenX = (1.0 - indexFinger.x) * window.innerWidth;
                    let screenY = indexFinger.y * window.innerHeight;
                    
                    emitFromScreen(screenX, screenY);
                }
            });

            const cameraApp = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraApp.start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 메인 렌더링 루프 (물리 연산 포함) ---
        function animate() {
            requestAnimationFrame(animate);
            
            let posUpdated = false;

            // [오류 수정 완료] 자바스크립트에서 물리 연산을 직접 처리하여 완벽하게 퍼지게 함
            for (let i = 0; i < MAX_PARTICLES; i++) {
                if (lifes[i] > 0.0) {
                    // 수명 감소
                    lifes[i] -= 0.015; 
                    if (lifes[i] <= 0.0) { lifes[i] = 0.0; continue; }

                    // 속도에 따라 위치 이동
                    positions[i * 3] += velocities[i * 3];
                    positions[i * 3 + 1] += velocities[i * 3 + 1];
                    positions[i * 3 + 2] += velocities[i * 3 + 2];

                    // 공기 저항 (서서히 느려짐)
                    velocities[i * 3] *= 0.96;
                    velocities[i * 3 + 1] *= 0.96;
                    velocities[i * 3 + 2] *= 0.96;

                    posUpdated = true;
                }
            }

            // GPU로 변경된 데이터 전송
            if (posUpdated) {
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.geometry.attributes.aLife.needsUpdate = true;
            }

            // 약간의 몽환적인 카메라 회전
            camera.position.x = Math.sin(clock.getElapsedTime() * 0.2) * 50;
            camera.position.y = Math.cos(clock.getElapsedTime() * 0.2) * 50;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        initThreeJS();
        initMediaPipe();
        animate();
    </script>
</body>
</html>
