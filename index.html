<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Luminous Trails (teamLab Vibe)</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #020204; /* 심연의 어둠 */
            font-family: Arial, sans-serif; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* 웹캠 영상은 뒤에서 AI 분석용으로만 돌고 화면엔 숨김 */
        #video { display: none; }
        
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8); font-size: 18px; letter-spacing: 2px;
            z-index: 10; pointer-events: none; transition: opacity 0.5s;
        }
        #error-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8); color: #fff; z-index: 9999; padding: 10px; display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="error-log"></div>
    <div id="loading">카메라 AI 로딩 중... (웹캠 권한을 허용해주세요)</div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;

        attribute vec3 aVelocity;
        attribute float aLife; // 파티클 수명 (0~1)
        attribute float aSize;
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vLife;

        void main() {
            vec3 pos = position;
            vColor = aColor;
            vLife = aLife;

            if (aLife > 0.0) {
                // 발산 속도(Velocity)에 따라 사방으로 퍼짐
                // uTime을 섞어 우주 유영 같은 부드러운 곡선 연출
                pos.x += aVelocity.x * aLife * 2.0 + sin(uTime * 2.0 + pos.y * 0.01) * 1.5;
                pos.y += aVelocity.y * aLife * 2.0 + cos(uTime * 2.0 + pos.x * 0.01) * 1.5;
                pos.z += aVelocity.z * aLife * 2.0;
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 수명이 0인 파티클은 그리지 않음, 남아있으면 크기 변화 부여
            gl_PointSize = (aLife > 0.0) ? (aSize * aLife * (800.0 / -mvPosition.z)) : 0.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vLife;

        void main() {
            if (vLife <= 0.0) discard;

            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            float dist = length(uv);
            if (dist > 0.5) discard;
            
            float glow = pow(1.0 - (dist * 2.0), 1.5);
            
            // 수명에 따라 서서히 투명해짐
            gl_FragColor = vec4(vColor, glow * vLife);
        }
    </script>

    <script>
        window.onerror = function(msg) {
            let err = document.getElementById('error-log');
            err.style.display = 'block'; err.innerHTML += msg;
            return false;
        };

        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2(); 
        
        // --- 입자 풀(Pool) 시스템 (최적화) ---
        const MAX_PARTICLES = 100000;
        let currentParticleIndex = 0;
        let positions, velocities, lifes, sizes, colors;

        // --- 1. Three.js 환경 셋업 ---
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 800;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(1.0); // 성능 최적화
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x020204, 1.0); 

            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_PARTICLES * 3);
            velocities = new Float32Array(MAX_PARTICLES * 3);
            lifes = new Float32Array(MAX_PARTICLES); // 수명 0.0이면 화면에 안 보임
            sizes = new Float32Array(MAX_PARTICLES);
            colors = new Float32Array(MAX_PARTICLES * 3);

            for (let i = 0; i < MAX_PARTICLES; i++) {
                positions[i * 3] = 0; positions[i * 3 + 1] = 0; positions[i * 3 + 2] = -9999;
                lifes[i] = 0.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aVelocity', new THREE.BufferAttribute(velocities, 3));
            geometry.setAttribute('aLife', new THREE.BufferAttribute(lifes, 1));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0.0 } },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- 2. 핵심: 손가락 위치에서 파티클 뿜어내기 (Emit) ---
        function emitParticles(x, y) {
            // 화면 좌표(-1 ~ 1)를 3D 공간 좌표로 투영
            raycaster.setFromCamera({ x: x, y: y }, camera);
            let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            let intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersectPoint);
            
            if (intersectPoint) {
                const emitCount = 100; // 한 프레임당 뿜어낼 입자 수
                const colorPalette = [
                    new THREE.Color(0x00e5ff), // 시안
                    new THREE.Color(0x2244ff), // 딥 블루
                    new THREE.Color(0xff00aa), // 핫핑크/마젠타
                    new THREE.Color(0xffffff)  // 코어 라이트
                ];

                for (let i = 0; i < emitCount; i++) {
                    let idx = currentParticleIndex;
                    currentParticleIndex = (currentParticleIndex + 1) % MAX_PARTICLES;

                    // 생성 위치 (손가락 끝 약간 주변)
                    positions[idx * 3] = intersectPoint.x + (Math.random() - 0.5) * 15;
                    positions[idx * 3 + 1] = intersectPoint.y + (Math.random() - 0.5) * 15;
                    positions[idx * 3 + 2] = intersectPoint.z + (Math.random() - 0.5) * 15;

                    // 폭발적으로 퍼져나가는 벡터 (사방으로)
                    velocities[idx * 3] = (Math.random() - 0.5) * 10.0;
                    velocities[idx * 3 + 1] = (Math.random() - 0.5) * 10.0;
                    velocities[idx * 3 + 2] = (Math.random() - 0.5) * 10.0;

                    lifes[idx] = 1.0; // 수명 부여 (화면 등장)
                    sizes[idx] = 6.0 + Math.random() * 20.0;

                    const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                    colors[idx * 3] = c.r; colors[idx * 3 + 1] = c.g; colors[idx * 3 + 2] = c.b;
                }
                
                // GPU에 데이터 갱신 알림
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.geometry.attributes.aVelocity.needsUpdate = true;
                particleSystem.geometry.attributes.aLife.needsUpdate = true;
                particleSystem.geometry.attributes.aSize.needsUpdate = true;
                particleSystem.geometry.attributes.aColor.needsUpdate = true;
            }
        }

        // --- 3. MediaPipe 웹캠 손가락 추적 ---
        function initMediaPipe() {
            const videoElement = document.getElementById('video');
            const loading = document.getElementById('loading');

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({
                maxNumHands: 1, 
                modelComplexity: 0, // ARM 최적화용 가장 가벼운 모델
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (loading.style.opacity !== '0') {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    // 검지손가락 끝부분 (index 8)
                    const indexFinger = results.multiHandLandmarks[0][8];
                    
                    // 웹캠 좌우 반전 처리 후 -1 ~ 1 화면 좌표계 변환
                    const screenX = (1.0 - indexFinger.x) * 2 - 1;
                    const screenY = -(indexFinger.y) * 2 + 1;

                    // 파티클 뿜어내기 실행!
                    emitParticles(screenX, screenY);
                }
            });

            const cameraApp = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraApp.start();
        }

        // --- 4. 메인 렌더링 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 파티클 수명 감소 (수명이 다하면 화면에서 사라짐)
            for (let i = 0; i < MAX_PARTICLES; i++) {
                if (lifes[i] > 0.0) {
                    lifes[i] -= 0.015; // 감소 속도
                    if (lifes[i] <= 0.0) lifes[i] = 0.0;
                }
            }
            particleSystem.geometry.attributes.aLife.needsUpdate = true;

            particleMaterial.uniforms.uTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        initThreeJS();
        initMediaPipe();
        animate();
    </script>
</body>
</html>
