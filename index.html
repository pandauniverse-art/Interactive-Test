<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Interactive Waterfall (teamLab Vibe)</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #000000; /* 완전한 어둠 */
            font-family: Arial, sans-serif; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* 웹캠 영상은 뒤에서 AI 분석용으로만 돌고 화면엔 숨김 */
        #video { display: none; }
        
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8); font-size: 18px; letter-spacing: 2px;
            z-index: 10; pointer-events: none; transition: opacity 0.5s;
        }
        #error-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.8); color: #fff; z-index: 9999; padding: 10px; display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="error-log"></div>
    <div id="loading">카메라 AI 로딩 중... (웹캠 권한을 허용해주세요)</div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform vec3 uHandPos; // 웹캠으로 추적한 손가락의 3D 좌표
        uniform float uSplashPower; // 물보라 세기

        attribute vec3 aRandom; 
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec3 pos = position;
            vColor = aColor;
            vAlpha = 1.0;

            // 1. 덩어리감 있는 폭포수 물결 (sin/cos 간섭)
            float wave = sin(pos.y * 0.005 + uTime * 0.5) * cos(pos.x * 0.002);
            pos.x += wave * 20.0; 

            // 2. 폭포수 낙하
            float fallSpeed = 150.0 + (aRandom.x * 300.0);
            pos.y -= uTime * fallSpeed;
            pos.y = mod(pos.y + 1500.0, 3000.0) - 1500.0; // 무한 루프

            // 3. 웹캠 손가락(HandPos)에 부딪히는 물보라 (Splash)
            float distToHand = distance(pos.xy, uHandPos.xy);
            float effectRadius = 300.0; // 손가락 주변 반응 반경

            if (distToHand < effectRadius && uSplashPower > 0.0) {
                float force = pow(1.0 - (distToHand / effectRadius), 2.0) * uSplashPower;
                
                // 물방울이 위(Y축)와 앞(Z축)으로 솟구침
                vec3 splashDir = normalize(pos - uHandPos);
                splashDir.y = abs(splashDir.y) + 1.5; 
                splashDir.z += 1.0; 
                
                pos += splashDir * force * 400.0;
                
                // 손가락에 부딪힌 물보라는 핫핑크/하얀색으로 발광
                vColor = mix(vColor, vec3(1.0, 0.4, 0.8), force);
                vAlpha = 1.0 + force * 2.0; 
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = aRandom.z * (1000.0 / -mvPosition.z);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            uv.x *= 7.0; // 세로로 긴 빗줄기 모양
            float dist = length(uv);
            
            if (dist > 0.5) discard; 
            
            float glow = pow(1.0 - (dist * 2.0), 1.5);
            gl_FragColor = vec4(vColor, glow * vAlpha * 0.8);
        }
    </script>

    <script>
        window.onerror = function(msg) {
            let err = document.getElementById('error-log');
            err.style.display = 'block'; err.innerHTML += msg;
            return false;
        };

        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2(); // 정규화된 손가락 화면 좌표 (-1 ~ 1)
        
        let handPos3D = new THREE.Vector3(0, -5000, 0); // 쉐이더로 넘길 손가락 3D 좌표
        let targetHandPos3D = new THREE.Vector3(0, -5000, 0);
        let splashPower = 0.0;
        let isHandDetected = false;

        // --- 1. Three.js 우주 폭포 셋업 ---
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.00035);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(1.0); // 갤럭시북S 최적화
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1.0); 

            // 25만 개 파티클 (최적화 밀도)
            const particleCount = 250000;
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0x0088ff), // 시안 블루
                new THREE.Color(0x1133ff), // 딥 블루
                new THREE.Color(0x3300ff), // 다크 퍼플
                new THREE.Color(0xffffff)  // 코어 화이트
            ];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 3500; 
                positions[i * 3 + 1] = (Math.random() - 0.5) * 3000; 
                positions[i * 3 + 2] = (Math.random() - 0.5) * 1000; 

                randoms[i * 3] = Math.random(); 
                randoms[i * 3 + 1] = Math.random(); 
                randoms[i * 3 + 2] = 3.0 + Math.random() * 12.0; 

                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uHandPos: { value: handPos3D },
                    uSplashPower: { value: 0.0 }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- 2. MediaPipe 웹캠 AI 셋업 (손가락 추적) ---
        function initMediaPipe() {
            const videoElement = document.getElementById('video');
            const loading = document.getElementById('loading');

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            hands.setOptions({
                maxNumHands: 1, // 성능을 위해 하나의 손만 정확히 추적
                modelComplexity: 0, // 갤럭시북S(ARM) 최적화를 위해 가장 가벼운 모델 사용
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            // 매 프레임마다 손가락 위치 분석
            hands.onResults((results) => {
                if (loading.style.opacity !== '0') {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandDetected = true;
                    // landmarks[8] = 검지 손가락 끝
                    const indexFinger = results.multiHandLandmarks[0][8];
                    
                    // 웹캠 거울 모드(좌우반전) 적용하여 화면 좌표계(-1 ~ 1)로 변환
                    mouse.x = (1.0 - indexFinger.x) * 2 - 1;
                    mouse.y = -(indexFinger.y) * 2 + 1;

                    // 2D 마우스 좌표를 3D 공간 좌표로 변환
                    raycaster.setFromCamera(mouse, camera);
                    let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
                    let intersectPoint = new THREE.Vector3();
                    raycaster.ray.intersectPlane(plane, intersectPoint);
                    
                    if (intersectPoint) {
                        targetHandPos3D.copy(intersectPoint);
                    }
                } else {
                    isHandDetected = false; // 손이 안 보이면 물보라 꺼짐
                }
            });

            const cameraApp = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraApp.start();
        }

        // --- 3. 메인 렌더링 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 손이 인식되면 물보라 발생, 사라지면 서서히 가라앉음
            if (isHandDetected) {
                splashPower += (1.0 - splashPower) * 0.2; // 부드럽게 켜짐
                handPos3D.lerp(targetHandPos3D, 0.3); // 손가락 위치를 부드럽게 따라감
            } else {
                splashPower -= 0.05; 
                if (splashPower < 0) splashPower = 0.0;
            }

            // 쉐이더 업데이트
            particleMaterial.uniforms.uTime.value = elapsedTime;
            particleMaterial.uniforms.uHandPos.value.copy(handPos3D);
            particleMaterial.uniforms.uSplashPower.value = splashPower;

            renderer.render(scene, camera);
        }

        // 실행
        initThreeJS();
        initMediaPipe();
        animate();
    </script>
</body>
</html>
