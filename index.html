<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exhibition - Optimized Luminous Waterfall</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background-color: #000000; /* 완전한 어둠 */
            touch-action: none; font-family: Arial, sans-serif; cursor: crosshair; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hint {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 14px; letter-spacing: 8px; font-weight: bold;
            z-index: 10; pointer-events: none; transition: opacity 0.5s; mix-blend-mode: screen;
        }
    </style>
</head>
<body>
    <div id="hint">CLICK TO SPLASH THE WATERFALL</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform vec3 uClickPos;
        uniform float uClickStrength;

        attribute vec3 aRandom; 
        attribute vec3 aColor;

        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec3 pos = position;
            vColor = aColor;
            vAlpha = 1.0;

            // 1. 가벼운 연산으로 '폭포수 덩어리감(Clumps)' 만들기
            // 삼각함수 간섭을 이용해 특정 구간의 파티클들이 서로 모이게 함
            float wave = sin(pos.y * 0.005 + uTime * 0.5) * cos(pos.x * 0.002);
            pos.x += wave * 20.0; // 물결처럼 일렁임

            // 2. 위에서 아래로 쏟아지는 폭포수
            float fallSpeed = 150.0 + (aRandom.x * 300.0);
            pos.y -= uTime * fallSpeed;

            // 무한 루프 (화면 밖으로 나가면 위로 재배치)
            pos.y = mod(pos.y + 1500.0, 3000.0) - 1500.0;

            // 3. 클릭 상호작용: 돌에 부딪히는 물보라 (Splash)
            float distToClick = distance(pos.xy, uClickPos.xy);
            float effectRadius = 250.0; 

            if (distToClick < effectRadius && uClickStrength > 0.0) {
                float force = pow(1.0 - (distToClick / effectRadius), 2.0) * uClickStrength;
                
                // 물방울이 위(Y축)와 앞(Z축)으로 솟구침
                vec3 splashDir = normalize(pos - uClickPos);
                splashDir.y = abs(splashDir.y) + 1.5; // 강하게 위로 꺾임
                splashDir.z += 1.0; // 화면 앞으로 튀어나옴
                
                pos += splashDir * force * 350.0;
                
                // 튀어오르는 물방울은 핫핑크/하얀색으로 발광 (teamLab 포인트 컬러)
                vColor = mix(vColor, vec3(1.0, 0.4, 0.8), force);
                vAlpha = 1.0 + force * 2.0; 
            }

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 깊이에 따른 파티클 크기
            gl_PointSize = aRandom.z * (1000.0 / -mvPosition.z);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
            vec2 uv = gl_PointCoord.xy - vec2(0.5);
            
            // X축을 강하게 압축시켜 세로로 얇고 긴 빗줄기(Streak) 모양 생성
            uv.x *= 7.0; 
            float dist = length(uv);
            
            if (dist > 0.5) discard; // 원형(압축된 타원) 밖은 그림 그리지 않음
            
            // 빛이 퍼지는 부드러운 글로우 효과
            float glow = pow(1.0 - (dist * 2.0), 1.5);
            
            gl_FragColor = vec4(vColor, glow * vAlpha * 0.8);
        }
    </script>

    <script>
        const clock = new THREE.Clock();
        let scene, camera, renderer;
        let particleMaterial, particleSystem;
        
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        let clickPos = new THREE.Vector3(0, -5000, 0); 
        let clickStrength = 0.0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.00035); // 깊이감을 위한 안개

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 4000);
            camera.position.z = 1000;

            // [최적화 1] antialias 끄기 및 고해상도 렌더링(PixelRatio) 제한
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(1.0); // 1.0 고정으로 노트북 발열 및 렉 방지
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1.0); 
            document.body.appendChild(renderer.domElement);

            // [최적화 2] 파티클 수 25만 개로 타협 (대신 크기와 빛을 키워 밀도감 유지)
            const particleCount = 250000;
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(particleCount * 3);
            const randoms = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            // 팀랩 Vibe의 시안 & 딥블루 베이스
            const colorPalette = [
                new THREE.Color(0x0088ff), // 시안 블루
                new THREE.Color(0x1133ff), // 딥 블루
                new THREE.Color(0x3300ff), // 다크 퍼플
                new THREE.Color(0xffffff)  // 코어 화이트
            ];

            for (let i = 0; i < particleCount; i++) {
                // 넓게 분포
                positions[i * 3] = (Math.random() - 0.5) * 3500; 
                positions[i * 3 + 1] = (Math.random() - 0.5) * 3000; 
                positions[i * 3 + 2] = (Math.random() - 0.5) * 1000; 

                randoms[i * 3] = Math.random(); // 속도 변수
                randoms[i * 3 + 1] = Math.random(); // 흔들림 변수
                randoms[i * 3 + 2] = 3.0 + Math.random() * 12.0; // 크기 변수 (입자를 크게!)

                const c = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
            geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0.0 },
                    uClickPos: { value: clickPos },
                    uClickStrength: { value: 0.0 }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending, // 겹치면 밝아지는 팀랩 발광 효과
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, particleMaterial);
            scene.add(particleSystem);

            // 이벤트 리스너
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onPointerDown);
            document.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e.touches[0]); }, { passive: false });
        }

        // 클릭/터치 시 3D 좌표 탐색 및 물보라 에너지 발생
        function onPointerDown(e) {
            document.getElementById('hint').style.opacity = '0';
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // Z=0 평면
            let intersectPoint = new THREE.Vector3();
            
            raycaster.ray.intersectPlane(plane, intersectPoint);
            
            if (intersectPoint) {
                clickPos.copy(intersectPoint);
                clickStrength = 1.0; // 물보라 트리거
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 물보라 에너지 서서히 감소 (퍼졌다가 가라앉는 물리 느낌)
            if (clickStrength > 0.0) {
                clickStrength -= 0.02; 
                if (clickStrength < 0) clickStrength = 0.0;
            }

            // 쉐이더 변수 업데이트
            particleMaterial.uniforms.uTime.value = elapsedTime;
            particleMaterial.uniforms.uClickPos.value.copy(clickPos);
            particleMaterial.uniforms.uClickStrength.value = clickStrength;

            // 카메라가 좌우로 미세하게 움직이며 공간감(Parallax) 부여
            camera.position.x = Math.sin(elapsedTime * 0.3) * 30;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
